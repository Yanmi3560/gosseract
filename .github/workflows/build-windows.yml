name: Build Windows Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install tesseract via vcpkg
        run: |
          C:/vcpkg/vcpkg install tesseract:x64-windows

      - name: Set environment
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "CC=C:/vcpkg/installed/x64-windows/tools/mingw64/bin/gcc.exe" >> $GITHUB_ENV
          echo "CGO_CFLAGS=-IC:/vcpkg/installed/x64-windows/include" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-LC:/vcpkg/installed/x64-windows/lib" >> $GITHUB_ENV
          echo "TESSDATA_PREFIX=C:/vcpkg/installed/x64-windows/share/tesseract/tessdata" >> $GITHUB_ENV

      - name: Build
        run: go build -ldflags="-s -w" -o ocr.exe ./cmd/ocr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-windows-x64
          path: ocr.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ocr.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
