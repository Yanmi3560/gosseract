name: Build Windows Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install tesseract via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-tesseract-ocr
            mingw-w64-x86_64-tesseract-data-eng

      - name: Build
        shell: msys2 {0}
        run: |
          # Running inside MSYS2 MINGW64 shell: gcc here is MSYS2's MinGW gcc,
          # with /mingw64/include and /mingw64/lib in its default search path.
          # path-type: inherit makes Go (from setup-go) available in this shell.
          echo "gcc: $(which gcc)"
          echo "go:  $(which go)"
          gcc --version
          CGO_ENABLED=1 go build -ldflags="-s -w" -o ocr.exe ./cmd/ocr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-windows-x64
          path: ocr.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ocr.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
