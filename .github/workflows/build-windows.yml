name: Build Windows Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install tesseract via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-tesseract-ocr
            mingw-w64-x86_64-tesseract-data-eng

      - name: Build
        run: |
          # Set CC and library paths in the same step to avoid cross-step env propagation issues.
          # msys2/setup-msys2 installs MinGW-native .a libs under C:\msys64\mingw64.
          $env:CGO_ENABLED  = "1"
          $env:CC           = "C:\msys64\mingw64\bin\gcc.exe"
          $env:CXX          = "C:\msys64\mingw64\bin\g++.exe"
          $env:CGO_CFLAGS   = "-IC:/msys64/mingw64/include"
          $env:CGO_LDFLAGS  = "-LC:/msys64/mingw64/lib"
          $env:PATH         = "C:\msys64\mingw64\bin;" + $env:PATH
          Write-Host "CC=$($env:CC)"
          Write-Host "CGO_LDFLAGS=$($env:CGO_LDFLAGS)"
          go env CC CGO_LDFLAGS
          go build -ldflags="-s -w" -o ocr.exe ./cmd/ocr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-windows-x64
          path: ocr.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ocr.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
