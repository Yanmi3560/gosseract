name: Build Windows Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install tesseract via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-tesseract-ocr
            mingw-w64-x86_64-tesseract-data-eng

      - name: Build
        run: |
          # setup-msys2 prepends MSYS2 MINGW64/bin to PATH.
          # Derive all CGO paths from gcc's actual location so we don't
          # hardcode the versioned hostedtoolcache path that changes over time.
          $gccExe  = (Get-Command gcc.exe -ErrorAction Stop).Source
          $mingw64 = (Split-Path (Split-Path $gccExe)).Replace('\', '/')
          Write-Host "gcc : $gccExe"
          Write-Host "root: $mingw64"
          $env:CGO_ENABLED = "1"
          $env:CC          = $gccExe
          $env:CXX         = (Get-Command g++.exe -ErrorAction Stop).Source
          $env:CGO_CFLAGS  = "-I$mingw64/include"
          $env:CGO_LDFLAGS = "-L$mingw64/lib"
          go env CC CGO_CFLAGS CGO_LDFLAGS
          go build -ldflags="-s -w" -o ocr.exe ./cmd/ocr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-windows-x64
          path: ocr.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ocr.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
