name: Build Windows Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install tesseract via vcpkg
        run: |
          C:/vcpkg/vcpkg install tesseract:x64-windows

      - name: Set environment
        run: |
          $includePath = "C:/vcpkg/installed/x64-windows/include"
          $libPath = "C:/vcpkg/installed/x64-windows/lib"
          $tessdataPath = "C:/vcpkg/installed/x64-windows/share/tesseract/tessdata"
          echo "CGO_ENABLED=1" >> $env:GITHUB_ENV
          echo "CC=x86_64-w64-mingw32-gcc" >> $env:GITHUB_ENV
          echo "CGO_CFLAGS=-I$includePath" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L$libPath" >> $env:GITHUB_ENV
          echo "TESSDATA_PREFIX=$tessdataPath" >> $env:GITHUB_ENV
          echo "PATH=C:/vcpkg/installed/x64-windows/bin;$env:PATH" >> $env:GITHUB_ENV

      - name: Show installed files
        run: |
          Get-ChildItem C:/vcpkg/installed/x64-windows/include -Recurse -Filter "allheaders.h" | Select-Object FullName

      - name: Build
        run: go build -ldflags="-s -w" -o ocr.exe ./cmd/ocr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-windows-x64
          path: ocr.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ocr.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
