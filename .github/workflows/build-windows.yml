name: Build Windows Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install tesseract via MSYS2
        run: |
          # MSYS2's mingw-w64-x86_64-tesseract-ocr provides MinGW-native .a import
          # libraries, avoiding the MSVC .lib vs MinGW .a ABI mismatch from vcpkg.
          C:\msys64\usr\bin\pacman.exe -Sy --noconfirm --needed `
            mingw-w64-x86_64-tesseract-ocr `
            mingw-w64-x86_64-tesseract-data-eng

      - name: Set environment
        run: |
          echo "CGO_ENABLED=1"                             >> $env:GITHUB_ENV
          echo "CC=C:/msys64/mingw64/bin/gcc.exe"          >> $env:GITHUB_ENV
          echo "CXX=C:/msys64/mingw64/bin/g++.exe"         >> $env:GITHUB_ENV
          echo "CGO_CFLAGS=-IC:/msys64/mingw64/include"    >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-LC:/msys64/mingw64/lib"       >> $env:GITHUB_ENV
          echo "TESSDATA_PREFIX=C:/msys64/mingw64/share/tessdata" >> $env:GITHUB_ENV
          echo "PATH=C:/msys64/mingw64/bin;$env:PATH"      >> $env:GITHUB_ENV

      - name: Show installed headers
        run: |
          Get-ChildItem C:/msys64/mingw64/include -Recurse -Filter "allheaders.h" | Select-Object FullName

      - name: Build
        run: go build -ldflags="-s -w" -o ocr.exe ./cmd/ocr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-windows-x64
          path: ocr.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ocr.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
